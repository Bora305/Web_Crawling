name: Market Monitor (7AM - Midnight)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  monitor:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        pip install requests beautifulsoup4 apscheduler
    
    - name: Run monitor
      env:
        DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
      run: |
        python monitor_v2.py
    
    - name: Upload state file
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: monitored-posts
        path: monitored_posts.json
        retention-days: 30
