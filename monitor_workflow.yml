name: Market Monitor v3

on:
  workflow_dispatch:
  schedule:
    # 오전 7시부터 자정까지 5분 간격 실행
    # 월-금: 07:00 ~ 23:55
    - cron: '*/5 7-23 * * 1-5'
    # 토-일: 07:00 ~ 23:55
    - cron: '*/5 7-23 * * 0,6'

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run monitor
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python monitor_v3.py

      - name: Upload state
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: monitored-posts
          path: monitored_posts.json
          retention-days: 7
